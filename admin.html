<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycle Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 24px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 32px; }
  .stats { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
  .stat-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 16px 20px; min-width: 120px; }
  .stat-card .num { font-size: 24px; font-weight: 700; color: #fff; }
  .stat-card .label { font-size: 11px; color: #888; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab { background: transparent; border: 1px solid #333; color: #aaa; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; transition: all 0.15s; }
  .tab:hover { border-color: #555; color: #ddd; }
  .tab.active { background: #fff; color: #000; border-color: #fff; }
  .table-wrap { overflow-x: auto; border: 1px solid #2a2a2a; border-radius: 10px; background: #1a1a1a; max-height: 600px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 12px 16px; border-bottom: 1px solid #2a2a2a; color: #888; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; position: sticky; top: 0; background: #1a1a1a; z-index: 1; }
  td { padding: 10px 16px; border-bottom: 1px solid #1f1f1f; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  td.wrap { white-space: normal; max-width: 400px; }
  tr:hover td { background: #222; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .badge-vibe { background: #2a1a2a; color: #d4a; }
  .badge-treatment { background: #1a2a2a; color: #4da; }
  .badge-mood { background: #2a2a1a; color: #da4; }
  .badge-event { background: #1a1a2a; color: #4ad; }
  .empty { text-align: center; padding: 48px; color: #555; }
  .refresh-btn { background: #2a2a2a; border: 1px solid #333; color: #ccc; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-left: auto; }
  .refresh-btn:hover { background: #333; }
  .header-row { display: flex; align-items: center; margin-bottom: 32px; }
  .header-row h1 { margin-bottom: 0; }
</style>
</head>
<body>

<div class="header-row">
  <div>
    <h1>Cycle Admin</h1>
    <div class="subtitle">Analytics & data · <span id="last-updated"></span></div>
  </div>
  <div style="display:flex; gap:8px; margin-left:auto">
    <button class="refresh-btn" onclick="sendTestPush()" title="Send test notification">🔔 Test Push</button>
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</div>

<!-- Funnel + costs at the top (most important) -->
<div id="funnel" style="margin-bottom:24px"></div>

<!-- Quick stats row -->
<div class="stats" id="stats"></div>

<!-- Data tabs -->
<div class="tabs">
  <button class="tab active" data-tab="profiles">Profiles</button>
  <button class="tab" data-tab="accounts">Accounts</button>
  <button class="tab" data-tab="completions">Day Completions</button>
  <button class="tab" data-tab="moods">Moods</button>
  <button class="tab" data-tab="favorites">Saved Content</button>
  <button class="tab" data-tab="content">AI Content</button>
  <button class="tab" data-tab="journals">Journals</button>
  <button class="tab" data-tab="events">Events</button>
</div>

<div id="profiles" class="table-wrap"></div>
<div id="accounts" class="table-wrap" style="display:none"></div>
<div id="completions" class="table-wrap" style="display:none"></div>
<div id="moods" class="table-wrap" style="display:none"></div>
<div id="favorites" class="table-wrap" style="display:none"></div>
<div id="content" class="table-wrap" style="display:none"></div>
<div id="journals" class="table-wrap" style="display:none"></div>
<div id="events" class="table-wrap" style="display:none"></div>

<script>
const tabs = document.querySelectorAll('.tab')
tabs.forEach(t => t.addEventListener('click', () => {
  tabs.forEach(x => x.classList.remove('active'))
  t.classList.add('active')
  document.querySelectorAll('.table-wrap').forEach(w => w.style.display = 'none')
  document.getElementById(t.dataset.tab).style.display = 'block'
}))

function esc(s) {
  if (s == null) return '<span style="color:#555">—</span>'
  const d = document.createElement('div')
  d.textContent = String(s)
  return d.innerHTML
}

function renderTable(rows, columns) {
  if (!rows.length) return '<div class="empty">No data yet</div>'
  let html = '<table><tr>'
  columns.forEach(c => html += `<th>${esc(c.label || c.key)}</th>`)
  html += '</tr>'
  rows.forEach(row => {
    html += '<tr>'
    columns.forEach(c => {
      const val = c.render ? c.render(row[c.key], row) : esc(row[c.key])
      html += `<td class="${c.wrap ? 'wrap' : ''}">${val}</td>`
    })
    html += '</tr>'
  })
  html += '</table>'
  return html
}

function badge(text, cls) { return `<span class="badge ${cls}">${esc(text)}</span>` }
function arr(val) { return Array.isArray(val) ? val.map(v => esc(v)).join(', ') : esc(val) }
function timeAgo(ts) {
  if (!ts) return '—'
  const d = new Date(ts + 'Z')
  const now = new Date()
  const mins = Math.floor((now - d) / 60000)
  if (mins < 1) return 'just now'
  if (mins < 60) return mins + 'm ago'
  if (mins < 1440) return Math.floor(mins/60) + 'h ago'
  return Math.floor(mins/1440) + 'd ago'
}

const MOOD_EMOJI = { great: '😍', good: '😊', okay: '😐', tough: '😔', hard: '😢' }

async function loadAll() {
  const [stats, profiles, accounts, content, journals, moods, favorites, completions, events, funnel] = await Promise.all([
    fetch('/api/admin/stats').then(r => r.json()),
    fetch('/api/admin/profiles').then(r => r.json()),
    fetch('/api/admin/accounts').then(r => r.json()),
    fetch('/api/admin/content').then(r => r.json()),
    fetch('/api/admin/journals').then(r => r.json()),
    fetch('/api/admin/moods').then(r => r.json()),
    fetch('/api/admin/favorites').then(r => r.json()),
    fetch('/api/admin/completions').then(r => r.json()),
    fetch('/api/admin/events').then(r => r.json()),
    fetch('/api/admin/funnel').then(r => r.json()).catch(() => null),
  ])

  document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString()

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="num">${stats.profiles}</div><div class="label">Profiles</div></div>
    <div class="stat-card"><div class="num">${stats.accounts}</div><div class="label">Accounts</div></div>
    <div class="stat-card"><div class="num">${stats.completions}</div><div class="label">Days Done</div></div>
    <div class="stat-card"><div class="num">${stats.moods}</div><div class="label">Moods</div></div>
    <div class="stat-card"><div class="num">${stats.favorites}</div><div class="label">Saved</div></div>
    <div class="stat-card"><div class="num">${stats.content}</div><div class="label">AI Content</div></div>
    <div class="stat-card"><div class="num">${stats.journals}</div><div class="label">Journals</div></div>
    <div class="stat-card"><div class="num">${stats.events}</div><div class="label">Events</div></div>
    <div class="stat-card"><div class="num">${stats.spotifyTaps}</div><div class="label">Spotify Taps</div></div>
  `

  // Funnel
  if (funnel && !funnel.error) {
    const f = funnel.funnel, c = funnel.conversion, e = funnel.engagement, r = funnel.retention, g = funnel.gifting
    const pct = (a, b) => b > 0 ? Math.round(a / b * 100) + '%' : '—'
    document.getElementById('funnel').innerHTML = `
      <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:16px;">
        <!-- Acquisition Funnel -->
        <div style="background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:16px;">
          <div style="font-size:11px; color:#888; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:12px; font-weight:500;">Acquisition Funnel</div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            ${[
              { label: 'Profiles created', val: f.profilesCreated, bar: 100 },
              { label: 'Completed Day 1', val: f.completedDay1, bar: f.profilesCreated ? f.completedDay1/f.profilesCreated*100 : 0 },
              { label: 'Completed Day 2', val: f.completedDay2, bar: f.profilesCreated ? f.completedDay2/f.profilesCreated*100 : 0 },
              { label: 'Completed Day 3', val: f.completedDay3, bar: f.profilesCreated ? f.completedDay3/f.profilesCreated*100 : 0 },
              { label: 'Created account', val: f.accountsCreated, bar: f.profilesCreated ? f.accountsCreated/f.profilesCreated*100 : 0 },
              { label: 'Paid', val: f.paidUsers, bar: f.profilesCreated ? f.paidUsers/f.profilesCreated*100 : 0 },
              { label: 'Reached Day 4+', val: f.completedDay4Plus, bar: f.profilesCreated ? f.completedDay4Plus/f.profilesCreated*100 : 0 },
              { label: 'Completed full cycle', val: f.fullCycleUsers, bar: f.profilesCreated ? f.fullCycleUsers/f.profilesCreated*100 : 0 },
            ].map(r => `
              <div>
                <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:3px;">
                  <span style="color:#ccc;">${r.label}</span>
                  <span style="color:#fff; font-weight:600;">${r.val}</span>
                </div>
                <div style="height:4px; background:#2a2a2a; border-radius:2px; overflow:hidden;">
                  <div style="height:100%; width:${Math.max(r.bar, 1)}%; background:linear-gradient(90deg, #C4614A, #E8A598); border-radius:2px;"></div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>

        <!-- Conversion Gaps -->
        <div style="background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:16px;">
          <div style="font-size:11px; color:#888; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:12px; font-weight:500;">Conversion Gaps</div>
          <div style="display:flex; flex-direction:column; gap:10px;">
            <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:#222; border-radius:8px;">
              <div><div style="font-size:12px; color:#e0e0e0;">Guests without account</div><div style="font-size:10px; color:#666;">Did 3 days but never registered</div></div>
              <div style="font-size:20px; font-weight:700; color:#F5C842;">${c.guestsNoAccount}</div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:#222; border-radius:8px;">
              <div><div style="font-size:12px; color:#e0e0e0;">Registered but not paid</div><div style="font-size:10px; color:#666;">Created account, never upgraded</div></div>
              <div style="font-size:20px; font-weight:700; color:#F5C842;">${c.registeredNotPaid}</div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:#222; border-radius:8px;">
              <div><div style="font-size:12px; color:#e0e0e0;">Paywall views → payment</div><div style="font-size:10px; color:#666;">Conversion rate</div></div>
              <div style="font-size:16px; font-weight:700; color:#7BD4A0;">${pct(c.paymentCompleted, c.paywallViews)}</div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:#222; border-radius:8px;">
              <div><div style="font-size:12px; color:#e0e0e0;">Day 3 → Day 4 conversion</div><div style="font-size:10px; color:#666;">Free trial → paid</div></div>
              <div style="font-size:16px; font-weight:700; color:#7BD4A0;">${pct(f.completedDay4Plus, f.completedDay3)}</div>
            </div>
          </div>
        </div>

        <!-- Engagement -->
        <div style="background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:16px;">
          <div style="font-size:11px; color:#888; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:12px; font-weight:500;">Engagement</div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
            <div style="text-align:center; padding:10px; background:#222; border-radius:8px;"><div style="font-size:22px; font-weight:700; color:#C4614A;">${e.avgDaysPerUser}</div><div style="font-size:9px; color:#666; margin-top:2px;">Avg days/user</div></div>
            <div style="text-align:center; padding:10px; background:#222; border-radius:8px;"><div style="font-size:22px; font-weight:700; color:#C4614A;">${e.totalJournals}</div><div style="font-size:9px; color:#666; margin-top:2px;">Journal entries</div></div>
            <div style="text-align:center; padding:10px; background:#222; border-radius:8px;"><div style="font-size:22px; font-weight:700; color:#C4614A;">${e.totalFavorites}</div><div style="font-size:9px; color:#666; margin-top:2px;">Items saved</div></div>
            <div style="text-align:center; padding:10px; background:#222; border-radius:8px;"><div style="font-size:22px; font-weight:700; color:#C4614A;">${e.quotesShared}</div><div style="font-size:9px; color:#666; margin-top:2px;">Quotes shared</div></div>
            <div style="text-align:center; padding:10px; background:#222; border-radius:8px;"><div style="font-size:22px; font-weight:700; color:#C4614A;">${e.meditationsStarted}</div><div style="font-size:9px; color:#666; margin-top:2px;">Meditations</div></div>
            <div style="text-align:center; padding:10px; background:#222; border-radius:8px;"><div style="font-size:22px; font-weight:700; color:#C4614A;">${e.spotifyTaps}</div><div style="font-size:9px; color:#666; margin-top:2px;">Spotify taps</div></div>
            <div style="text-align:center; padding:10px; background:#222; border-radius:8px;"><div style="font-size:22px; font-weight:700; color:#C4614A;">${e.fuelDismissals}</div><div style="font-size:9px; color:#666; margin-top:2px;">Fuel dismissed</div></div>
            <div style="text-align:center; padding:10px; background:#222; border-radius:8px;"><div style="font-size:22px; font-weight:700; color:#C4614A;">${e.spotifyConnections}</div><div style="font-size:9px; color:#666; margin-top:2px;">Spotify linked</div></div>
          </div>
        </div>

        <!-- API Costs -->
        <div style="background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:16px;">
          <div style="font-size:11px; color:#888; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:12px; font-weight:500;">API Costs</div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:#222; border-radius:8px;">
              <div><div style="font-size:12px; color:#e0e0e0;">Total API calls</div><div style="font-size:10px; color:#666;">Claude content generation</div></div>
              <div style="font-size:18px; font-weight:700; color:#C4614A;">${funnel.costs.totalApiCalls}</div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:#222; border-radius:8px;">
              <div><div style="font-size:12px; color:#e0e0e0;">Total cost</div><div style="font-size:10px; color:#666;">Estimated from token usage</div></div>
              <div style="font-size:18px; font-weight:700; color:#F5C842;">$${funnel.costs.totalCostUsd}</div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:#222; border-radius:8px;">
              <div><div style="font-size:12px; color:#e0e0e0;">Today's cost</div></div>
              <div style="font-size:18px; font-weight:700; color:#F5C842;">$${funnel.costs.todayCostUsd}</div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:#222; border-radius:8px;">
              <div><div style="font-size:12px; color:#e0e0e0;">Cost per user</div><div style="font-size:10px; color:#666;">Total cost ÷ total profiles</div></div>
              <div style="font-size:18px; font-weight:700; color:#7BD4A0;">$${funnel.costs.costPerUser}</div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:#222; border-radius:8px;">
              <div><div style="font-size:12px; color:#e0e0e0;">Tokens used</div><div style="font-size:10px; color:#666;">Input / Output</div></div>
              <div style="font-size:12px; font-weight:600; color:#ccc;">${(funnel.costs.totalInputTokens/1000).toFixed(1)}k / ${(funnel.costs.totalOutputTokens/1000).toFixed(1)}k</div>
            </div>
          </div>
        </div>

        <!-- Retention & Gifting -->
        <div style="background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:16px;">
          <div style="font-size:11px; color:#888; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:12px; font-weight:500;">Retention & Gifting</div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:#222; border-radius:8px;">
              <span style="font-size:12px; color:#ccc;">Journeys paused</span>
              <span style="font-size:18px; font-weight:700; color:#F5C842;">${r.journeysPaused}</span>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:#222; border-radius:8px;">
              <span style="font-size:12px; color:#ccc;">Journeys resumed</span>
              <span style="font-size:18px; font-weight:700; color:#7BD4A0;">${r.journeysResumed}</span>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:#222; border-radius:8px;">
              <span style="font-size:12px; color:#ccc;">Gifts purchased</span>
              <span style="font-size:18px; font-weight:700; color:#C4614A;">${g.giftsPurchased}</span>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:#222; border-radius:8px;">
              <span style="font-size:12px; color:#ccc;">Gifts redeemed</span>
              <span style="font-size:18px; font-weight:700; color:#7BD4A0;">${g.giftsRedeemed}</span>
            </div>
          </div>
        </div>
      </div>
    `
  }

  document.getElementById('profiles').innerHTML = renderTable(profiles, [
    { key: 'name', label: 'Name' },
    { key: 'treatment', label: 'Treatment', render: v => badge(v, 'badge-treatment') },
    { key: 'cycle_days', label: 'Days' },
    { key: 'vibe', label: 'Vibe', render: v => badge(v, 'badge-vibe') },
    { key: 'components', label: 'Components', render: arr },
    { key: 'genres', label: 'Genres', render: arr },
    { key: 'current_day', label: 'Day' },
    { key: 'created_at', label: 'Created', render: timeAgo },
  ])

  document.getElementById('accounts').innerHTML = renderTable(accounts, [
    { key: 'email', label: 'Email' },
    { key: 'profile_id', label: 'Profile' },
    { key: 'plan', label: 'Plan', render: v => v ? badge(v, 'badge-treatment') : '<span style="color:#555">free</span>' },
    { key: 'created_at', label: 'Created', render: timeAgo },
  ])

  document.getElementById('completions').innerHTML = renderTable(completions, [
    { key: 'user_id', label: 'User' },
    { key: 'day_number', label: 'Day' },
    { key: 'completed_at', label: 'Completed', render: timeAgo },
  ])

  document.getElementById('moods').innerHTML = renderTable(moods, [
    { key: 'user_id', label: 'User' },
    { key: 'day_number', label: 'Day' },
    { key: 'mood', label: 'Mood', render: v => `${MOOD_EMOJI[v] || ''} ${esc(v)}` },
    { key: 'logged_at', label: 'Logged', render: timeAgo },
  ])

  document.getElementById('favorites').innerHTML = renderTable(favorites, [
    { key: 'user_id', label: 'User' },
    { key: 'day_number', label: 'Day' },
    { key: 'type', label: 'Type', render: v => badge(v, 'badge-mood') },
    { key: 'content', label: 'Content', wrap: true },
    { key: 'author', label: 'Author' },
    { key: 'saved_at', label: 'Saved', render: timeAgo },
  ])

  document.getElementById('content').innerHTML = renderTable(content, [
    { key: 'user_id', label: 'User' },
    { key: 'day_number', label: 'Day' },
    { key: 'quote', label: 'Quote', wrap: true },
    { key: 'quote_author', label: 'Author' },
    { key: 'song_title', label: 'Song' },
    { key: 'song_artist', label: 'Artist' },
    { key: 'affirmation', label: 'Affirmation', wrap: true },
    { key: 'generated_at', label: 'Generated', render: timeAgo },
  ])

  document.getElementById('journals').innerHTML = renderTable(journals, [
    { key: 'user_id', label: 'User' },
    { key: 'day_number', label: 'Day' },
    { key: 'content', label: 'Entry', wrap: true },
    { key: 'created_at', label: 'Created', render: timeAgo },
  ])

  document.getElementById('events').innerHTML = renderTable(events, [
    { key: 'user_id', label: 'User' },
    { key: 'event', label: 'Event', render: v => badge(v, 'badge-event') },
    { key: 'data', label: 'Data', wrap: true, render: v => { try { const d = JSON.parse(v); return esc(JSON.stringify(d)) } catch { return esc(v) } } },
    { key: 'created_at', label: 'Time', render: timeAgo },
  ])
}

async function sendTestPush() {
  const userId = prompt('Send test push to which user? (enter name)')
  if (!userId) return
  try {
    const res = await fetch('/api/push/test', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId }),
    })
    const data = await res.json()
    alert(data.success ? `Push sent to ${userId}!` : `Failed: ${data.error}`)
  } catch (err) {
    alert('Failed to send push: ' + err.message)
  }
}

loadAll()
</script>
</body>
</html>
